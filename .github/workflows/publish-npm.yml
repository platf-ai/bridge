name: Publish to npm

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version bump
        id: bump
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "type=${{ inputs.bump }}" >> "$GITHUB_OUTPUT"
          else
            COMMIT_MSG=$(git log -1 --pretty=%B)
            if echo "$COMMIT_MSG" | head -1 | grep -qi '^\[major\]'; then
              echo "type=major" >> "$GITHUB_OUTPUT"
            elif echo "$COMMIT_MSG" | head -1 | grep -qi '^\[minor\]'; then
              echo "type=minor" >> "$GITHUB_OUTPUT"
            else
              echo "type=patch" >> "$GITHUB_OUTPUT"
            fi
          fi
          echo "Bump type: $(cat "$GITHUB_OUTPUT" | grep type | cut -d= -f2)"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        run: |
          BUMP_TYPE=${{ steps.bump.outputs.type }}
          CURRENT=$(jq -r .version package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP_TYPE" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          jq --arg v "$NEW_VERSION" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json
          echo "version=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped $CURRENT → $NEW_VERSION ($BUMP_TYPE)"

      - name: Commit and tag version
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git add package.json
          git commit -m "chore: release $VERSION"
          git tag "$VERSION"
          git push origin main --tags

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Publish to npm
        run: bun publish --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
